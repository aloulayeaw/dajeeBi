services:
  backend:
    build: ./dajee-bi-backend
    container_name: dajee-bi-backend
    restart: always
    env_file:
      - ./dajee-bi-backend/.env
    ports:
      - "5500:5500"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:5500"

  frontend:
    build: ./dajee-bi-frontend
    container_name: dajee-bi-frontend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://backend:5500
    depends_on:
      - backend